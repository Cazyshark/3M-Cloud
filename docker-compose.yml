version: '3.8'

services:
  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    ports:
      - "8080:8080"
    environment:
      - MASTER_LISTEN=:8080
    networks:
      - ops-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8081:8081"
    environment:
      - GATEWAY_LISTEN=:8081
      - AGENT_TOKENS=secret-token-1,secret-token-2
      - MASTER_SECRET=master-secret
    networks:
      - ops-net

networks:
  ops-net:
    driver: bridge
