version: '3.8'

services:
  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    ports:
      - "8080:8080"
    environment:
      - MASTER_LISTEN=:8080
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - AUDIT_DIR=/data/audit
    volumes:
      - master-audit:/data/audit
    networks:
      - ops-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8081:8081"
    environment:
      - GATEWAY_LISTEN=:8081
      - AGENT_TOKENS=${AGENT_TOKENS:?AGENT_TOKENS must be set}
      - MASTER_SECRET=${MASTER_SECRET:?MASTER_SECRET must be set}
      - MASTER_WS_URL=ws://master:8080/ws/gateway
    networks:
      - ops-net
    depends_on:
      master:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  master-audit:

networks:
  ops-net:
    driver: bridge
